<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>zPlayer — Now Playing</title>
<style>
  :root {
    --accent: #1ba1e2;
    --type: "Segoe UI", "Segoe WP", "Helvetica Neue", Arial, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: #141414;
    font-family: var(--type);
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ---- studio stage ---- */
  #stage {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background:
      radial-gradient(120% 120% at 50% 0%, #232323 0%, #0e0e0e 70%);
  }
  #scaler { transform-origin: center center; }

  /* ---- screen ---- */
  .screen {
    width: 480px; height: 800px;
    overflow: hidden;
    position: relative;
    background: var(--bg);
    color: var(--fg);
    box-shadow: 0 30px 80px -24px rgba(0,0,0,.7);
  }

  /* ---- screen themes ---- */
  .screen[data-theme="dark"]  { --bg:#000; --fg:#fff; --dim:rgba(255,255,255,.55); --line:rgba(255,255,255,.22); }
  .screen[data-theme="light"] { --bg:#fafafa; --fg:#0a0a0a; --dim:rgba(0,0,0,.5); --line:rgba(0,0,0,.18); }

  /* ---- status bar ---- */
  .statusbar {
    height: 30px;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 8px;
    padding: 0 12px;
    font-size: 13px;
    font-weight: 400;
    color: var(--fg);
    letter-spacing: .2px;
  }
  .statusbar .sig { display:flex; gap:3px; align-items:flex-end; opacity:.9; }
  .statusbar .sig i { width:3px; background: var(--fg); display:block; border-radius:1px; }
  .statusbar .clock { margin-left: 2px; }

  /* ---- screen body / nav ---- */
  .screen-body { height: 800px; position: relative; }
  @media (prefers-reduced-motion: no-preference) {
    .screen-in { animation: screenIn .34s cubic-bezier(.2,.7,.3,1); }
    @keyframes screenIn { from { transform: translateX(24px); } to { transform: none; } }
  }
  .page { height: 100%; display: flex; flex-direction: column; }
  .page-back {
    position: absolute; top: 10px; left: 14px; z-index: 5;
    width: 40px; height: 40px; border: none; background: none; cursor: pointer;
    color: var(--fg); display: flex; align-items: center; justify-content: center;
  }
  .page-back svg { width: 24px; height: 24px; }

  /* ---- overline + pivot ---- */
  .overline {
    font-size: 14px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 1.5px; color: var(--fg); opacity: .9;
    padding: 22px 26px 4px;
  }
  .pivot { overflow-x: auto; overflow-y: hidden; padding: 2px 0 6px; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
  .pivot::-webkit-scrollbar { width: 0; height: 0; }
  .pivot-track { display: flex; gap: 28px; width: max-content; padding-right: 60px; }
  .pivot-h {
    font-size: 42px; font-weight: 250; line-height: 1; letter-spacing: -.5px;
    white-space: nowrap; cursor: pointer; color: var(--fg); opacity: .32;
    transition: opacity .25s ease; -webkit-tap-highlight-color: transparent;
  }
  .pivot-h.active { opacity: 1; }

  /* ---- scroll list ---- */
  .scroll { flex: 1; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; }
  .scroll::-webkit-scrollbar { width: 0; height: 0; }
  .scroll { scrollbar-width: none; }

  /* artists */
  .artist-list { padding: 8px 26px 30px; }
  .artist-item {
    font-size: 32px; font-weight: 250; line-height: 1.42;
    color: var(--accent); cursor: pointer; letter-spacing: -.3px;
  }

  /* albums */
  .album-list { padding: 6px 26px 30px; }
  .album-group { margin-bottom: 16px; }
  .group-head {
    background: var(--accent); color: #fff;
    font-size: 23px; font-weight: 400; padding: 7px 14px; margin-bottom: 10px;
  }
  .album-row { display: flex; gap: 16px; align-items: center; cursor: pointer; }
  .thumb { flex: 0 0 auto; }
  .album-meta { min-width: 0; }
  .al-title { font-size: 24px; font-weight: 300; line-height: 1.15; text-wrap: pretty; }
  .al-year { font-size: 18px; font-weight: 300; color: var(--dim); margin-top: 4px; }

  /* songs */
  .song-list { padding: 8px 26px 0; }
  .index-tile {
    width: 46px; height: 46px; background: var(--accent); color: #fff;
    display: flex; align-items: flex-end; padding: 4px 6px; box-sizing: border-box;
    font-size: 22px; font-weight: 400; margin: 14px 0 12px;
  }
  .song-row { cursor: pointer; padding: 7px 0; }
  .sr-title { font-size: 24px; font-weight: 300; line-height: 1.1; }
  .sr-artist { font-size: 17px; font-weight: 300; color: var(--dim); margin-top: 3px; }

  /* playlists */
  .pl-list { padding: 10px 26px 0; }
  .pl-row { display: flex; gap: 16px; align-items: center; padding: 9px 0; cursor: pointer; }
  .pl-mosaic { width: 88px; height: 88px; flex: 0 0 auto; display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
  .pl-name { font-size: 25px; font-weight: 300; line-height: 1.1; }
  .pl-count { font-size: 17px; font-weight: 300; color: var(--dim); margin-top: 4px; }

  /* top songs */
  .top-list { padding: 12px 26px 0; }
  .top-row { display: flex; align-items: center; gap: 16px; padding: 9px 0; cursor: pointer; }
  .top-rank { width: 22px; flex: 0 0 auto; text-align: right; font-size: 20px; font-weight: 400; color: var(--dim); }
  .top-info { flex: 1; min-width: 0; }
  .top-title { font-size: 23px; font-weight: 300; line-height: 1.1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .top-artist { font-size: 16px; font-weight: 300; color: var(--dim); margin-top: 2px; }
  .top-dl { flex: 0 0 auto; width: 42px; height: 42px; border: none; background: none; cursor: pointer;
    color: var(--fg); opacity: .6; display: flex; align-items: center; justify-content: center; -webkit-tap-highlight-color: transparent; }
  .top-dl.done { color: var(--accent); opacity: 1; }

  /* ---- section label ---- */
  .section { color: var(--accent); font-size: 18px; font-weight: 600; letter-spacing: .3px; padding: 16px 0 10px; }

  /* ---- generic list rows (artists / songs / radio) ---- */
  .llist { padding: 6px 26px 0; }
  .lrow { display: flex; align-items: center; gap: 16px; padding: 8px 0; }
  .play-circle { flex: 0 0 auto; width: 38px; height: 38px; border: none; background: none; padding: 0; cursor: pointer;
    color: var(--fg); opacity: .9; display: flex; align-items: center; justify-content: center; -webkit-tap-highlight-color: transparent; transition: transform .08s ease; }
  .play-circle:active { transform: scale(.88); }
  .lrow-name { flex: 1; min-width: 0; font-size: 27px; font-weight: 300; line-height: 1.05; cursor: pointer; letter-spacing: -.2px; }
  .lrow-name.song { line-height: 1.1; }
  .lrow-title { font-size: 24px; font-weight: 300; line-height: 1.1; }
  .lrow-sub { font-size: 16px; font-weight: 300; color: var(--dim); margin-top: 2px; }
  .genre-item { font-size: 30px; font-weight: 300; line-height: 1.5; color: var(--accent); cursor: pointer; }

  /* ---- hub (home panorama) ---- */
  .hub { position: relative; height: 100%; overflow: hidden; }
  .hub-bg { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }
  .hub-scrim { position: absolute; inset: 0; pointer-events: none;
    background: linear-gradient(180deg, rgba(0,0,0,.5) 0%, rgba(0,0,0,.3) 38%, rgba(0,0,0,.8) 100%); }
  .pano-title { position: absolute; top: 26px; left: 26px; z-index: 2; pointer-events: none; will-change: transform;
    font-size: 92px; font-weight: 200; line-height: .9; letter-spacing: -2px; color: var(--fg); white-space: nowrap; }
  .hub-strip { position: relative; z-index: 1; height: 100%; display: flex; overflow-x: auto; overflow-y: hidden;
    scrollbar-width: none; -webkit-overflow-scrolling: touch; }
  .hub-strip::-webkit-scrollbar { width: 0; height: 0; }
  .pane { flex: 0 0 446px; height: 100%; padding: 150px 26px 96px;
    overflow-y: auto; overflow-x: hidden; scrollbar-width: none; }
  .pane::-webkit-scrollbar { width: 0; height: 0; }
  .pane-head { font-size: 40px; font-weight: 250; color: var(--fg); line-height: 1; }
  .hub-menu { margin-top: 18px; display: flex; flex-direction: column; align-items: flex-start; }
  .hub-item { background: none; border: none; color: var(--fg); font: inherit; font-size: 31px; font-weight: 300;
    padding: 8px 0; cursor: pointer; text-align: left; -webkit-tap-highlight-color: transparent; }
  .hub-item:active { opacity: .55; }

  /* now-playing pane */
  .nowpane .pane-head { margin-bottom: 20px; }
  .nowpane .artrow { margin-top: 0; }
  .nowpane .art, .nowpane .track { cursor: pointer; }
  .nowpane .by { font-size: 21px; font-weight: 300; color: var(--dim); margin-top: 4px; }
  .transport.sm { margin-top: 20px; gap: 20px; }
  .transport.sm .tbtn { width: 58px; height: 58px; }
  .transport.sm .tbtn svg { width: 26px; height: 26px; }
  .transport.sm .tbtn.mid svg { width: 23px; height: 23px; }

  /* ---- app bar (left buttons) ---- */
  .appbar-left { display: flex; align-items: center; gap: 16px; }
  .ic-btn { width: 48px; height: 48px; border-radius: 50%; border: 2px solid var(--fg); background: none; color: var(--fg);
    display: flex; align-items: center; justify-content: center; cursor: pointer; opacity: .92; -webkit-tap-highlight-color: transparent; transition: transform .08s ease; }
  .ic-btn:active { transform: scale(.92); }

  /* ---- artist card ---- */
  .artist-card { position: relative; height: 100%; overflow: hidden; }
  .card-bg { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }
  .card-scrim { position: absolute; inset: 0; pointer-events: none; background: linear-gradient(180deg, rgba(0,0,0,.45), rgba(0,0,0,.84)); }
  .card-body { position: relative; flex: 1; min-height: 0; display: flex; flex-direction: column; }
  .artist-card .scroll { padding: 0 26px; }
  .card-album { display: flex; gap: 18px; align-items: center; padding: 9px 0; cursor: pointer; }
  .ca-title { font-size: 25px; font-weight: 300; line-height: 1.12; text-wrap: pretty; }
  .ca-sub { font-size: 17px; font-weight: 300; color: var(--dim); margin-top: 4px; }
  .store-row { display: flex; align-items: center; gap: 16px; padding: 8px 0; }
  .dl-circle { flex: 0 0 auto; width: 46px; height: 46px; border: none; background: none; color: var(--fg); cursor: pointer;
    display: flex; align-items: center; justify-content: center; opacity: .9; -webkit-tap-highlight-color: transparent; }
  .store-text { font-size: 20px; font-weight: 300; color: var(--fg); opacity: .85; }

  /* album detail */
  .al-head { display: flex; gap: 18px; padding: 14px 26px 22px; }
  .al-head-meta { display: flex; flex-direction: column; justify-content: flex-end; }
  .al-head-title { font-size: 26px; font-weight: 300; line-height: 1.1; text-wrap: pretty; }
  .al-head-sub { font-size: 18px; font-weight: 300; color: var(--dim); margin-top: 4px; }
  .al-playall {
    margin-top: 14px; align-self: flex-start; display: flex; align-items: center; gap: 8px;
    background: none; border: 2px solid var(--fg); color: var(--fg);
    padding: 6px 16px 6px 12px; font: inherit; font-size: 17px; cursor: pointer;
    border-radius: 22px;
  }
  .track-list { padding: 0 26px; }
  .al-track {
    display: flex; align-items: center; gap: 16px; padding: 12px 0;
    border-top: 1px solid var(--line); cursor: pointer;
  }
  .al-tnum { width: 20px; color: var(--dim); font-size: 18px; }
  .al-ttitle { flex: 1; font-size: 22px; font-weight: 300; }
  .al-tdur { color: var(--dim); font-size: 16px; }
  .review { padding: 18px 26px; }
  .review-body { font-size: 20px; font-weight: 300; line-height: 1.5; margin-top: 18px; color: var(--fg); opacity: .92; }
  .stars { margin-top: 18px; font-size: 28px; color: var(--accent); letter-spacing: 4px; }
  .stars .dim { color: var(--line); }

  /* ---- now playing ---- */
  .np { padding: 18px 26px 0; height: 100%; position: relative; }

  .transport {
    display: flex;
    gap: 26px;
    margin-top: 16px;
  }
  .tbtn {
    width: 66px; height: 66px;
    border-radius: 50%;
    border: 2px solid var(--fg);
    background: transparent;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    opacity: .92;
    transition: transform .08s ease, opacity .15s ease;
    -webkit-tap-highlight-color: transparent;
  }
  .tbtn:active { transform: scale(.9); }
  .tbtn svg { width: 30px; height: 30px; fill: var(--fg); }
  .tbtn.mid svg { width: 26px; height: 26px; }

  .meta { margin-top: 46px; }
  .artist {
    font-size: 46px;
    font-weight: 250;
    line-height: .98;
    letter-spacing: -.5px;
    text-wrap: balance;
  }
  .album {
    font-size: 27px;
    font-weight: 250;
    margin-top: 8px;
    color: var(--fg);
    opacity: .92;
    text-wrap: pretty;
  }

  .artrow { display: flex; gap: 22px; margin-top: 24px; }
  .art {
    width: 156px; height: 156px;
    flex: 0 0 auto;
    position: relative;
    background: #1a1a1a;
  }
  .art image-slot { width: 156px; height: 156px; display: block; }
  .sideicons {
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 6px 0;
  }
  .iconbtn {
    background: none; border: none; cursor: pointer; padding: 0;
    width: 34px; height: 34px;
    display: flex; align-items: center; justify-content: center;
    -webkit-tap-highlight-color: transparent;
    transition: transform .08s ease;
  }
  .iconbtn:active { transform: scale(.85); }
  .iconbtn svg { width: 30px; height: 30px; }
  .iconbtn svg path, .iconbtn svg polygon { fill: var(--fg); transition: fill .15s ease; }
  .iconbtn.outline svg path { fill: none; stroke: var(--fg); stroke-width: 1.8; }
  .iconbtn.on svg path, .iconbtn.on svg polygon { fill: var(--accent); stroke: var(--accent); }

  /* ---- progress ---- */
  .progress { margin-top: 26px; }
  .bar {
    height: 4px;
    background: var(--line);
    position: relative;
    cursor: pointer;
  }
  .fill { position: absolute; left:0; top:0; bottom:0; background: var(--accent); }
  .times {
    display: flex; justify-content: space-between;
    margin-top: 9px;
    font-size: 14px; font-weight: 400;
  }
  .times .elapsed { color: var(--fg); }
  .times .remain { color: var(--dim); }

  /* ---- track + up next ---- */
  .track { margin-top: 18px; }
  .track .title { font-size: 30px; font-weight: 300; letter-spacing: -.2px; }
  .upnext { margin-top: 4px; }
  .upnext div { font-size: 21px; font-weight: 300; color: var(--dim); line-height: 1.3; }

  /* ---- app bar ---- */
  .appbar {
    position: absolute;
    left: 0; right: 0; bottom: 14px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 14px;
  }
  .appback { color: var(--fg); }
  .appback svg path { fill: none; stroke: var(--fg); }
  .ellipsis {
    display: flex; gap: 5px; padding: 12px;
    background: none; border: none; cursor: pointer;
  }
  .ellipsis i { width: 5px; height: 5px; border-radius: 50%; background: var(--fg); opacity: .85; }

  @media (prefers-reduced-motion: no-preference) {
    .swap { animation: rise .32s cubic-bezier(.2,.7,.3,1); }
    @keyframes rise { from { transform: translateY(12px); } to { transform: none; } }
  }
</style>
</head>
<body>
  <div id="stage">
    <div id="scaler">
      <div class="screen" id="screen" data-theme="dark">
        <div id="app"></div>
      </div>
    </div>
  </div>
  <div id="tweaks-root"></div>

  <script src="image-slot.js"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="collection.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>

  <script>
    // viewport scaling
    function fit() {
      const scaler = document.getElementById('scaler');
      const dev = scaler.firstElementChild;
      if (!dev) return;
      const m = 24;
      const s = Math.min((window.innerWidth - m) / dev.offsetWidth,
                         (window.innerHeight - m) / dev.offsetHeight);
      scaler.style.transform = 'scale(' + Math.min(s, 1) + ')';
    }
    window.addEventListener('resize', fit);
    window.addEventListener('load', () => { fit(); setTimeout(fit, 300); });
  </script>
</body>
</html>
